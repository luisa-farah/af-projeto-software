name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/imoveis-api:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          AUTH0_DOMAIN: ${{ secrets.AUTH0_DOMAIN }}
          AUTH0_AUDIENCE: ${{ secrets.AUTH0_AUDIENCE }}
          DOCKER_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/imoveis-api:latest
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: DATABASE_URL,AUTH0_DOMAIN,AUTH0_AUDIENCE,DOCKER_IMAGE
          script: |
            docker pull $DOCKER_IMAGE
            docker stop imoveis-api || true
            docker rm imoveis-api || true
            docker run -d --name imoveis-api --network rede -p 8000:8000 -e DATABASE_URL="$DATABASE_URL" -e AUTH0_DOMAIN="$AUTH0_DOMAIN" -e AUTH0_AUDIENCE="$AUTH0_AUDIENCE" --restart always $DOCKER_IMAGE
